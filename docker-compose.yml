services:

  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    image: ${IMAGE_BACKEND:-ghcr.io/hamedf62/jec/backend:latest}
    container_name: jec-backend
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data:rw
    environment:
      REDIS_HOST: redis-shared
      REDIS_PORT: 6379
      REDIS_DB: 0
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - jec-internal
      - shared-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ─── SvelteKit Frontend ────────────────────────────────────────────────────
  frontend:
    image: ${IMAGE_FRONTEND:-ghcr.io/hamedf62/jec/frontend:latest}
    container_name: jec-frontend
    restart: unless-stopped
    environment:
      ORIGIN: https://${DOMAIN:-jec.dataplay.dev}
      PORT: "3000"
      HOST: "0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          node -e " const http = require('http'); http.get('http://localhost:3000/', r => {
            process.exit(r.statusCode < 500 ? 0 : 1);
          }).on('error', () => process.exit(1)); "
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jec-internal
      - shared-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  # Internal network for JEC service-to-service communication
  jec-internal:
    driver: bridge
  # Shared network — nginx-shared, redis-shared, postgres-shared live here
  shared-net:
    name: shared-net
    external: true
