services:

  # ─── Redis Cache (internal only) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jec-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jec-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    image: ${IMAGE_BACKEND:-ghcr.io/hamedf62/jec/backend:latest}
    container_name: jec-backend
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data:rw
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - jec-internal
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=stats_ai_traefik"
      # ── HTTPS router ──────────────────────────────────────────────────────
      - "traefik.http.routers.jec-backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/docs`) || PathPrefix(`/redoc`) || PathPrefix(`/openapi.json`))"
      - "traefik.http.routers.jec-backend.entrypoints=websecure"
      - "traefik.http.routers.jec-backend.tls=true"
      - "traefik.http.routers.jec-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.jec-backend.service=jec-backend-svc"
      - "traefik.http.routers.jec-backend.priority=100"
      # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
      - "traefik.http.routers.jec-backend-http.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/docs`) || PathPrefix(`/redoc`) || PathPrefix(`/openapi.json`))"
      - "traefik.http.routers.jec-backend-http.entrypoints=web"
      - "traefik.http.routers.jec-backend-http.middlewares=https-redirect"
      - "traefik.http.routers.jec-backend-http.priority=100"
      # ── Service definition ─────────────────────────────────────────────────
      - "traefik.http.services.jec-backend-svc.loadbalancer.server.port=8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ─── SvelteKit Frontend ────────────────────────────────────────────────────
  frontend:
    image: ${IMAGE_FRONTEND:-ghcr.io/hamedf62/jec/frontend:latest}
    container_name: jec-frontend
    restart: unless-stopped
    environment:
      ORIGIN: https://${DOMAIN}
      PORT: "3000"
      HOST: "0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          node -e "
          const http = require('http');
          http.get('http://localhost:3000/', r => {
            process.exit(r.statusCode < 500 ? 0 : 1);
          }).on('error', () => process.exit(1));
          "
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jec-internal
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=stats_ai_traefik"
      # ── HTTPS router ──────────────────────────────────────────────────────
      - "traefik.http.routers.jec-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.jec-frontend.entrypoints=websecure"
      - "traefik.http.routers.jec-frontend.tls=true"
      - "traefik.http.routers.jec-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.jec-frontend.service=jec-frontend-svc"
      - "traefik.http.routers.jec-frontend.priority=10"
      # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
      - "traefik.http.routers.jec-frontend-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.jec-frontend-http.entrypoints=web"
      - "traefik.http.routers.jec-frontend-http.middlewares=https-redirect"
      - "traefik.http.routers.jec-frontend-http.priority=10"
      # ── Service definition ─────────────────────────────────────────────────
      - "traefik.http.services.jec-frontend-svc.loadbalancer.server.port=3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  redis_data:
    driver: local

networks:
  # Internal network for JEC service-to-service communication
  jec-internal:
    driver: bridge
  # External Traefik network shared across all projects on this server
  traefik-proxy:
    name: stats_ai_traefik
    external: true
